schema_version = "1.0.0"

id = "no3d_asset_developer"
version = "3.2.0"
name = "No3d Asset Developer"
tagline = "Export clean per-asset .blend files with metadata & thumbnails"
maintainer = "Joe Bowers <joe@welltarot.com>"
type = "add-on"

website = "https://no3dtools.com"

tags = ["Import-Export", "Pipeline"]

blender_version_min = "5.0.0"

license = [
  "SPDX:GPL-3.0-or-later",
]

copyright = [
  "2026 The Well Tarot, LLC",
]

# The add-on writes exported .blend/PNG/JSON/TXT files to a user-selected
# folder, and spawns a headless Blender subprocess for the Template Append
# (Method A) export pipeline.
[permissions]
files = "Export asset .blend files, thumbnails, and metadata to disk"
network = "Starts the official Blender MCP bridge server on localhost"

# Only ship what the add-on needs at runtime. Dev-only files (tests, demos,
# planning docs, node dumps, marketing art) are intentionally excluded.
[build]
paths = [
  "__init__.py",
  "operators.py",
  "ui.py",
  "utils.py",
  "wip_sync.py",
  "extraction_methods.py",
  "blend_export.py",
  "_export_single_asset.py",
  "_export_template.blend",
  "aspect_overlay.py",
  "clipboard_paste.py",
  "repo_registration.py",
  "editor_screenshot.py",
  "header_screenshots.py",
  "node_screenshot.py",
  "viewport_format.py",
  "viewport_screenshot.py",
  "notes/__init__.py",
  "notes/note_manager.py",
  "wip/__init__.py",
  "wip/ids.py",
  "wip/toolbox.py",
  "wip/align.py",
  "wip/make_spin.py",
  "claude_pair/__init__.py",
  "claude_pair/pair.py",
  "claude_pair/registry.py",
  "save_reload/__init__.py",
  "save_reload/save_op.py",
  "save_reload/helper.py",
  "LICENSE",
  "README.md",
]
